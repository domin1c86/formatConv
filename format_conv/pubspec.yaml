name: format_conv
description: Cross-platform format conversion tool
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.0.2
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  flutter_riverpod: ^2.4.9  # Chosen over provider for compile-safe state, auto-dispose, and better testability
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
