name: format_conv
description: Cross-platform format conversion tool
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.0.2
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  flutter_riverpod: ^2.4.9
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  msix: ^3.16.0

flutter:
  uses-material-design: true

msix_config:
  display_name: Format Converter
  publisher_display_name: FormatConv
  identity_name: com.formatconv.app
  msix_version: 1.0.0.0
  logo_path: windows/runner/resources/app_icon.ico
  capabilities: internetClient
